name: One Time Bind Device

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests pytz pycryptodome # 关键修改：增加了 pycryptodome
      - name: Run Bind Script
        env:
          CONFIG: ${{ secrets.CONFIG }}
          AES_KEY: ${{ secrets.AES_KEY }} # 必须传入这个，否则 util 库会报错
        run: python bind_virtual_device.py
