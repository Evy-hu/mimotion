name: One Time Bind Device

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  bind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests pytz
      - name: Run Bind Script
        env:
          CONFIG: ${{ secrets.CONFIG }} # 使用你之前配置好的 Secret
        run: python bind_virtual_device.py
